<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-search-bar">
                <img id="magnifying-glass-icon" src="../admin-dashboard/assets/icons/magnify.svg"
                    alt="Magnifying glass icon">
                <input id="header-search-bar-input" type="text">

                <div class="bell-profile-picture-and-name">
                    <img src="../admin-dashboard/assets/icons/bell-ring-outline.svg" id="bell-icon"
                        alt="Ringing bell icon">
                    <img src="../admin-dashboard/assets/images/profile-user-1.svg"
                        id="header-search-bar-profile-picture" alt="Profile picture">
                    <h3>Lucca Tirelli</h3>
                </div>

            </div>
            <div class="header-menu">
                <div class="header-menu-img-and-p">
                    <img src="../admin-dashboard/assets/images/profile-user-1.svg" alt="Profile picture">
                    <p>Hi there,<br><span class="span-name">Lucca Tirelli (@lucca)</span></p>
                </div>


                <div class="header-menu-buttons">
                    <ul class="header-menu-list">
                        <li><button class="header-menu-list-button" type="button">New</button></li>
                        <li><button class="header-menu-list-button" type="button">Upload</button></li>
                        <li><button class="header-menu-list-button" type="button">Share</button></li>
                    </ul>
                </div>

            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">
                <img src="../admin-dashboard/assets/icons/dashboard.svg" alt="Dashboard icon">
                <h2><a href="https://www.google.com.br" target="_blank">Dashboard</a></h2>
            </div>
            <div class="sidebar-first-fields">
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/home.svg" alt="Home icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Home</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/profile.svg" alt="Profile card icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Profile</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/messages.svg" alt="Message balloon icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Messages</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/history.svg" alt="Clock icon">
                    <h3><a href="https://www.google.com.br" target="_blank">History</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/tasks.svg" alt="Stack of files icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Tasks</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/communities.svg" alt="Group of users icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Communities</a></h3>
                </div>
            </div>
            <div class="sidebar-last-fields">
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/settings.svg" alt="Cog icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Settings</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/support.svg" alt="Box with interrogation symbol icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Support</a></h3>
                </div>
                <div class="sidebar-field">
                    <img src="../admin-dashboard/assets/icons/privacy.svg" alt="Shield with check mark icon">
                    <h3><a href="https://www.google.com.br" target="_blank">Privacy</a></h3>
                </div>
            </div>
        </div>
        <div class="content">
            <h2>Content</h2>
        </div>
    </div>
</body>

</html>
